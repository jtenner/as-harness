name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  npm-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.npm-matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install_args: bun

      - name: Emit npm matrix
        id: npm-matrix
        run: printf 'matrix=%s\n' "$(bun run ./scripts/host-validation-matrix.ts)" >> "$GITHUB_OUTPUT"

  build-npm-packages:
    name: Build npm package artifacts (${{ matrix.label }})
    needs:
      - npm-matrix
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.npm-matrix.outputs.matrix) }}
    env:
      NPM_ARTIFACT_DIR: ./dist/npm-release-artifacts/${{ matrix.label }}
      NPM_OUTPUT_DIR: ./dist/npm-${{ matrix.label }}
      NPM_PACKAGE_SELECTION: ${{ matrix.label == 'linux-x64' && 'all' || 'native' }}
      NPM_REPORT_DIR: ./dist/npm-reports-${{ matrix.label }}
      NPM_INSTALL_SMOKE_REPORT_DIR: ./dist/npm-install-smoke-reports-${{ matrix.label }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install_args: bun node go rust

      - name: Install CLI dependencies
        working-directory: ./cli
        run: bun install --frozen-lockfile

      - name: Install assembly dependencies
        working-directory: ./assembly
        run: npm ci

      - name: Build and smoke wazero host package
        working-directory: ./harness/wazero
        run: npm test

      - name: Build and smoke wasmtime host package
        working-directory: ./harness/wasmtime
        run: npm test

      - name: Verify staged npm package payloads
        run: bun run npm:verify -- --output-dir "${NPM_OUTPUT_DIR}" --report-dir "${NPM_REPORT_DIR}"

      - name: Run staged npm install smoke
        run: bun run npm:install-smoke -- --output-dir "${NPM_OUTPUT_DIR}" --report-dir "${NPM_INSTALL_SMOKE_REPORT_DIR}"

      - name: Pack release npm tarballs
        run: bun run npm:pack-release -- --output-dir "${NPM_OUTPUT_DIR}" --artifact-dir "${NPM_ARTIFACT_DIR}" --selection "${NPM_PACKAGE_SELECTION}"

      - name: Upload npm package artifacts
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: npm-package-artifacts-${{ matrix.label }}
          path: ./dist/npm-release-artifacts/${{ matrix.label }}

      - name: Upload npm verification reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: ignore
          name: npm-package-reports-${{ matrix.label }}
          path: |
            ./dist/npm-reports-${{ matrix.label }}/*
            ./dist/npm-install-smoke-reports-${{ matrix.label }}/*

  publish-npm:
    name: Publish npm packages
    needs:
      - build-npm-packages
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install_args: bun node

      - name: Download npm package artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./dist/npm-release-artifacts
          pattern: npm-package-artifacts-*

      - name: Publish npm packages in dependency order
        run: bun run npm:publish-release -- --artifact-dir ./dist/npm-release-artifacts --tag latest

  publish-github-release:
    name: Publish GitHub release page
    needs:
      - publish-npm
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create or update the GitHub release page
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE="$(mktemp)"
          trap 'rm -f "${NOTES_FILE}"' EXIT
          git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" > "${NOTES_FILE}"
          if [ ! -s "${NOTES_FILE}" ]; then
            echo "Missing annotated tag contents for ${GITHUB_REF_NAME}."
            exit 1
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file "${NOTES_FILE}"
          else
            gh release create "${GITHUB_REF_NAME}" --verify-tag --title "${GITHUB_REF_NAME}" --notes-file "${NOTES_FILE}"
          fi
