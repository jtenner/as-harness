name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.release-matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Emit release matrix
        id: release-matrix
        run: printf 'matrix=%s\n' "$(bun run ./scripts/release-matrix.ts)" >> "$GITHUB_OUTPUT"

  build-release-assets:
    name: Build release asset (${{ matrix.compileTarget }})
    needs:
      - release-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-matrix.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CLI dependencies
        working-directory: ./cli
        run: bun install --frozen-lockfile

      - name: Build and verify packaged release artifact
        run: bun run ./scripts/verify-packaged-cli.ts --target "${{ matrix.compileTarget }}" --asset-dir ./dist/release-assets --report-dir ./dist/packaged-cli-reports

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ matrix.artifactName }}
          path: ./dist/release-assets/*

      - name: Upload packaged CLI verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: packaged-cli-report-${{ matrix.compileTarget }}
          path: ./dist/packaged-cli-reports/*

  publish-release:
    name: Publish GitHub release
    needs:
      - build-release-assets
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Download built release assets
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./dist/release-assets

      - name: Stage release legal files
        run: bun run ./scripts/stage-release-legal.ts --asset-dir ./dist/release-assets

      - name: Generate release manifest and notes
        run: bun run ./scripts/release-manifest.ts --tag "$GITHUB_REF_NAME" --asset-dir ./dist/release-assets --notes-file ./dist/release-notes.md

      - name: Publish release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file ./dist/release-notes.md
            gh release upload "$tag" ./dist/release-assets/* --clobber
          else
            gh release create "$tag" ./dist/release-assets/* --notes-file ./dist/release-notes.md --title "$tag"
          fi
