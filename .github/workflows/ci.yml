name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install_args: bun node

      - name: Install CLI dependencies
        working-directory: ./cli
        run: bun install --frozen-lockfile

      - name: Run validation
        run: bun validate

      - name: Run root tests
        run: bun test

  host-validation-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.host-validation-matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install_args: bun

      - name: Emit host validation matrix
        id: host-validation-matrix
        run: printf 'matrix=%s\n' "$(bun run ./scripts/host-validation-matrix.ts)" >> "$GITHUB_OUTPUT"

  source-hosts:
    name: Source Hosts (${{ matrix.label }}, Node ${{ matrix.nodeVersion }})
    needs:
      - host-validation-matrix
      - validate-and-test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.host-validation-matrix.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install_args: bun node go rust

      - name: Install CLI dependencies
        working-directory: ./cli
        run: bun install --frozen-lockfile

      - name: Install assembly dependencies
        working-directory: ./assembly
        run: npm ci

      - name: Verify source hosts
        run: bun run ./scripts/verify-source-hosts.ts --target "${{ matrix.label }}" --report-dir ./dist/source-host-reports

      - name: Upload source-host report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: source-host-${{ matrix.label }}-node${{ matrix.nodeVersion }}
          path: ./dist/source-host-reports/*
