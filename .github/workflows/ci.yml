name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install CLI dependencies
        working-directory: ./cli
        run: bun install --frozen-lockfile

      - name: Run validation
        run: bun validate

      - name: Run root tests
        run: bun test

  host-validation-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.host-validation-matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Emit host validation matrix
        id: host-validation-matrix
        run: printf 'matrix=%s\n' "$(bun run ./scripts/host-validation-matrix.ts)" >> "$GITHUB_OUTPUT"

  source-hosts:
    name: Source Hosts (${{ matrix.label }}, Node ${{ matrix.nodeVersion }})
    needs:
      - host-validation-matrix
      - validate-and-test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.host-validation-matrix.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.nodeVersion }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CLI dependencies
        working-directory: ./cli
        run: bun install --frozen-lockfile

      - name: Install assembly dependencies
        working-directory: ./assembly
        run: npm ci

      - name: Verify source hosts
        run: bun run ./scripts/verify-source-hosts.ts --target "${{ matrix.label }}" --report-dir ./dist/source-host-reports

      - name: Upload source-host report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: source-host-${{ matrix.label }}-node${{ matrix.nodeVersion }}
          path: ./dist/source-host-reports/*

  release-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.release-matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Emit release matrix
        id: release-matrix
        run: printf 'matrix=%s\n' "$(bun run ./scripts/release-matrix.ts)" >> "$GITHUB_OUTPUT"

  packaged-cli:
    name: Packaged CLI (${{ matrix.compileTarget }})
    needs:
      - release-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-matrix.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CLI dependencies
        working-directory: ./cli
        run: bun install --frozen-lockfile

      - name: Verify packaged CLI
        run: bun run ./scripts/verify-packaged-cli.ts --target "${{ matrix.compileTarget }}" --asset-dir ./dist/release-assets --report-dir ./dist/packaged-cli-reports

      - name: Upload packaged CLI artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ matrix.artifactName }}
          path: ./dist/release-assets/*

      - name: Upload packaged CLI verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: packaged-cli-report-${{ matrix.compileTarget }}
          path: ./dist/packaged-cli-reports/*
